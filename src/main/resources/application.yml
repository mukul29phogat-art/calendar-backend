server:
  port: 8080
  tomcat:
    max-http-form-post-size: 256KB # body size for non-multipart POSTs (event JSON, etc.)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

notifications:
  email:
    # Part 11.4 — global kill-switch for outbound email. Dev/staging default true; flip to false
    # in CI or for emergency lockdowns. Tests pin behavior via @TestPropertySource.
    enabled: true
    # Dev allowlist (architecture spec §7.4): outbound mail to any address NOT ending in one of
    # these suffixes is dropped with BLOCKED_BY_ALLOWLIST. Empty list in prod (permits all).
    dev-allowlist:
      - "@childcarewow.com"
      - "@ccw.test"
  push:
    # Part 11.6 — global kill-switch. Default FALSE because v1 is web-only and no iOS/Android
    # client exists yet; live-fire push has nowhere to send. PushDispatcher returns DISABLED for
    # every call until the operator flips this AND provides a service-account JSON.
    enabled: false
    # Exact-match FCM token allowlist (architecture spec §7.4 dev-allowlist mandate, push variant).
    # Empty list in prod (permits all). Non-empty list restricts pushes to those specific devices.
    dev-allowlist: []
    firebase:
      # When true, FirebaseMessagingConfig creates the FirebaseApp + FirebaseMessaging beans from
      # service-account-path. Default false → no beans → PushDispatcher's @Autowired(required=false)
      # resolves to null → every send() returns DISABLED.
      enabled: false
      # Path to the Firebase service-account JSON. Operator sets this from the LocalStack /
      # Secrets Manager-materialized file at deploy time. Unused when firebase.enabled=false.
      service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

spring:
  application:
    name: calendar-backend
  # SMTP relay (architecture spec §7.4). Real creds come from AWS Secrets Manager via Spring
  # Cloud AWS in Series 11 deploys. The localhost placeholder keeps the JavaMailSender bean
  # auto-configurable in dev; un-allowlisted recipients are blocked BEFORE SMTP is touched.
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}
  servlet:
    multipart:
      max-request-size: 11MB # 1MB headroom over the 10MB attachment limit
      max-file-size: 10MB
  security:
    oauth2:
      resourceserver:
        jwt:
          # RSA public key in PEM format. For tests, src/test/resources provides a fixture key
          # pair. For real-Supabase deploys (Series 11+), application-{env}.yml overrides with
          # `jwk-set-uri: ${calendar.auth.supabase-issuer}/.well-known/jwks.json` because
          # Supabase signs with ES256 not RSA. The playbook spec used `public-key-location` —
          # honored here for test compatibility; documented as the env-specific deviation.
          public-key-location: classpath:supabase-jwt-public-key.pem
  jpa:
    # Flyway owns the schema; never let Hibernate generate or update it.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    url: ${spring.datasource.calendar.url}
    user: ${spring.datasource.calendar.username}
    password: ${spring.datasource.calendar.password}
    locations: classpath:db/migration
    baseline-on-migrate: false
  datasource:
    calendar:
      # Host port 5434 (not 5432) — operator has a host PostgreSQL 18 service
      # bound to 5432; see Part 0.2 deviation in progress.md.
      url: jdbc:postgresql://localhost:5434/calendar
      username: calendar
      password: calendar
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        pool-name: calendar-pool
    platform:
      url: jdbc:postgresql://localhost:5433/platform
      username: platform
      password: platform
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 5
        pool-name: platform-pool
        read-only: true
        auto-commit: true
