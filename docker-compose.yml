name: ccw-cal-dev

services:
  localstack:
    image: localstack/localstack:3.8
    container_name: ccw-cal-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=iam,sts,secretsmanager,ecs,ecr,s3,logs,cloudwatch,rds,acm,elbv2,route53
      - PERSISTENCE=1
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  calendar-db:
    image: postgres:15-alpine
    container_name: ccw-cal-calendar-db
    environment:
      POSTGRES_DB: calendar
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
    # NOTE: host port 5434 (not 5432) because the operator has a host PostgreSQL 18
    # service running on 5432. Container internal port stays at 5432. application.yml
    # in Part 0.3 will use jdbc:postgresql://localhost:5434/calendar.
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - calendar-db-data:/var/lib/postgresql/data

  platform-db:
    image: postgres:15-alpine
    container_name: ccw-cal-platform-db
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - platform-db-data:/var/lib/postgresql/data
      - ./docker/platform-seed.sql:/docker-entrypoint-initdb.d/01-platform-seed.sql:ro

volumes:
  localstack-data:
  calendar-db-data:
  platform-db-data:
